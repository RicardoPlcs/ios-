<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Simulador de iOS</title>

  <link rel="stylesheet" href="diseño.css" />
</head>

<body>

  <main class="escenario">

    <section class="telefono">

      <div class="pantalla">

        <div class="isla-dinamica"></div>

        <div class="barra-estado">
          <span id="horaBarra">09:41</span>
          <span class="estado-derecha">
            <span class="senal-celular" aria-label="Cobertura celular">
              <i></i><i></i><i></i><i></i>
            </span>
            <span class="wifi-ios" aria-label="WiFi"></span>
            <span class="bateria-ios" aria-label="Batería"><span></span></span>
          </span>
        </div>

        <!-- Alerta que aparece dentro de la pantalla del iPhone. -->
        <div id="alertaSistema" class="alerta-sistema">
          <div class="cuadro-alerta-sistema">
            <h3>Permiso denegado</h3>
            <p id="textoAlertaSistema"></p>
            <button id="cerrarAlertaSistema">Aceptar</button>
          </div>
        </div>

        <!-- Pantalla de bloqueo -->
        <section id="pantallaBloqueo" class="pantalla-bloqueo pantalla-activa">

          <div class="bloqueo-encabezado">
            <p id="fechaBloqueo">Domingo, 17 de mayo</p>
            <h1 id="horaBloqueo">09:41</h1>
          </div>

          <div class="panel-desbloqueo">

            <div id="desbloqueoPin" class="modo-desbloqueo activo">

              <div class="puntos-pin">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </div>

              <div class="teclado-pin">
                <button data-tecla="1">1</button>
                <button data-tecla="2">2</button>
                <button data-tecla="3">3</button>

                <button data-tecla="4">4</button>
                <button data-tecla="5">5</button>
                <button data-tecla="6">6</button>

                <button data-tecla="7">7</button>
                <button data-tecla="8">8</button>
                <button data-tecla="9">9</button>

                <button data-tecla="limpiar">C</button>
                <button data-tecla="0">0</button>
                <button data-tecla="borrar">⌫</button>
              </div>

            </div>

            <p id="mensajeDesbloqueo" class="mensaje-ayuda">
                 Ingresa el código • demo: 1234 </p>

            <p id="mensajeBloqueoTemporal" class="mensaje-bloqueo-temporal"></p>


          </div>

        </section>

        <!-- Pantalla de inicio -->
        <section id="pantallaInicio" class="pantalla-inicio">

          <div class="capa-fondo"></div>

          <header class="inicio-encabezado">

            <div>
              <p class="texto-pequeno">iPhone 15</p>
              <div class="titulo-inicio">
                <h2>Inicio</h2>
                <span id="usuarioInicio" class="usuario-inicio">Administrador</span>
              </div>
            </div>

            <button id="botonBloquear" class="boton-icono boton-bloquear-home" aria-label="Bloquear iPhone" title="Bloquear">
              <span class="cerradura-home"></span>
            </button>

          </header>

          <div id="cuadriculaApps" class="cuadricula-apps">

            <button class="icono-app" data-app="appstore">
              <span class="burbuja-app appstore"><span class="sim-logo logo-appstore"></span></span>
              <span>App Store</span>
            </button>

            <button class="icono-app" data-app="safari">
              <span class="burbuja-app safari"><span class="sim-logo logo-safari"></span></span>
              <span>Safari</span>
            </button>

            <button class="icono-app" data-app="procesos">
              <span class="burbuja-app procesos"><span class="sim-logo logo-procesos"></span></span>
              <span>Procesos</span>
            </button>

            <button class="icono-app" data-app="memoria">
              <span class="burbuja-app memoria"><span class="sim-logo logo-diagnostico"></span></span>
              <span>Diagnostico</span>
            </button>

            <button class="icono-app" data-app="archivos">
              <span class="burbuja-app archivos"><span class="sim-logo logo-archivos"></span></span>
              <span>Archivos</span>
            </button>

            <button class="icono-app" data-app="camara">
              <span class="burbuja-app camara"><span class="sim-logo logo-camara"></span></span>
              <span>Camara</span>
            </button>

            <button class="icono-app" data-app="fotos">
              <span class="burbuja-app fotos"><span class="sim-logo logo-fotos"></span></span>
              <span>Fotos</span>
            </button>

            <button class="icono-app" data-app="seguridad">
              <span class="burbuja-app seguridad"><span class="sim-logo logo-seguridad"></span></span>
              <span>Seguridad</span>
            </button>

            <button class="icono-app" data-app="ajustes">
              <span class="burbuja-app ajustes"><span class="sim-logo logo-ajustes"></span></span>
              <span>Ajustes</span>
            </button>

            <button class="icono-app" data-app="recientes">
              <span class="burbuja-app recientes"><span class="sim-logo logo-recientes"></span></span>
              <span>Recientes</span>
            </button>

            <!-- Aqui aparecen las apps que se descargan desde App Store -->
            <div id="appsInstaladasInicio" class="apps-instaladas-inicio"></div>

          </div>

          <nav class="dock">

            <button class="icono-app" data-app="appstore">
              <span class="burbuja-app appstore"><span class="sim-logo logo-appstore"></span></span>
            </button>

            <button class="icono-app" data-app="procesos">
              <span class="burbuja-app procesos"><span class="sim-logo logo-procesos"></span></span>
            </button>

            <button class="icono-app" data-app="safari">
              <span class="burbuja-app safari"><span class="sim-logo logo-safari"></span></span>
            </button>

            <button class="icono-app" data-app="seguridad">
              <span class="burbuja-app seguridad"><span class="sim-logo logo-seguridad"></span></span>
            </button>

          </nav>

        </section>

        <!-- Vista de apps -->
        <section id="vistaApp" class="vista-app">

          <header class="app-encabezado">

            <button id="botonVolverInicio" class="boton-icono">
              ‹
            </button>

            <div>
              <p id="subtituloApp" class="texto-pequeno">
                App
              </p>

              <h2 id="tituloApp">
                Titulo
              </h2>
            </div>

            <button id="botonCerrarApp" class="boton-icono">
              ×
            </button>

          </header>

          <div id="contenidoApp" class="contenido-app">
            <!-- Aqui JavaScript va a dibujar el contenido de cada app -->
          </div>

        </section>

      </div>

    </section>

  </main>

  <script src="funciones.js"></script>
</body>
</html>
